# Survival Analysis Pattern Template
# For time-to-event analysis using radiomic features
# Applicable to: ACRIN (survival prediction), oncology datasets

pattern_id: survival-analysis
name: "Radiomics Survival Analysis"
version: "1.0"
description: |
  Performs survival analysis using radiomic features to predict time-to-event outcomes.
  Supports overall survival, progression-free survival, and other time-to-event endpoints.
  Uses Cox proportional hazards models and machine learning survival methods.

tags:
  - survival
  - time-to-event
  - cox
  - oncology
  - prognosis

author: "QRadiomics Team"
created_at: "2025-12-29"
updated_at: "2026-01-06"

# =============================================================================
# SNIPPETS - Reusable code components from COMB
# =============================================================================
snippets:
  - name: template_radiomics
    version: latest
    required: true
    description: "PyRadiomics feature extraction"
  - name: template_data_utils
    version: latest
    required: true
    description: "Data loading and preprocessing utilities"
  - name: template_nested_cv
    version: latest
    required: true
    description: "Nested cross-validation for robust survival model evaluation"
  - name: template_external_validation
    version: latest
    required: false
    description: "External cohort validation"
  - name: template_shap
    version: latest
    required: false
    description: "SHAP explainability for survival models"

# =============================================================================
# REQUIREMENTS
# =============================================================================
requirements:
  modalities:
    - modality: CT
      required: true
      description: "Primary imaging modality"
    - modality: PT
      required: false
      description: "PET for metabolic features"
    - modality: RTSTRUCT
      required: true
      description: "Tumor/target segmentation"

  anatomical_region: general

  roi_types: [] # Flexible - typically GTV, tumor, lesion

  clinical_variables:
    required:
      - name: survival_time
        type: numeric
        description: "Time to event or censoring (days)"
      - name: event
        type: binary
        description: "Event occurred (1) or censored (0)"
    optional:
      - name: age
        type: numeric
      - name: gender
        type: categorical
      - name: stage
        type: categorical
      - name: treatment_arm
        type: categorical
      - name: performance_status
        type: categorical

  min_subjects: 50

  survival_requirements:
    min_events: 20
    min_follow_up_months: 12
    description: "Minimum events needed for stable survival estimates"

# =============================================================================
# PREPROCESSING
# =============================================================================
preprocessing:
  crop:
    enabled: true
    margin_mm: 10
    to_roi: true

  resample:
    enabled: true
    spacing: [1.0, 1.0, 1.0]
    interpolation: bspline

  normalization:
    method: zscore
    per_modality: true

  intensity_windowing:
    CT:
      window_center: 40
      window_width: 400

# =============================================================================
# FEATURE EXTRACTION
# =============================================================================
feature_extraction:
  extractor: pyradiomics
  config_ref: pyradiomics/ct_default.yaml

  image_types:
    - Original
    - Wavelet

  feature_classes:
    - firstorder
    - shape
    - glcm
    - glrlm
    - glszm
    - gldm
    - ngtdm

  settings:
    normalize: true
    normalizeScale: 100
    binWidth: 25

  quality_control:
    icc_threshold: 0.8
    min_voxels: 10
    check_nan: true

# =============================================================================
# ANALYSIS
# =============================================================================
analysis:
  task: survival

  feature_selection:
    method: lasso # L1 penalized Cox regression
    max_features: 15
    variance_threshold: 0.01
    correlation_threshold: 0.9

    # Survival-specific selection
    univariate_screening:
      enabled: true
      p_threshold: 0.1
      method: log_rank

  modeling:
    algorithms:
      - CoxPH
      - RandomSurvivalForest
      - GradientBoostingSurvival

    default_params:
      CoxPH:
        penalizer: 0.1
        l1_ratio: 0.5 # Elastic net
      RandomSurvivalForest:
        n_estimators: 100
        max_depth: 10
        min_samples_leaf: 10
      GradientBoostingSurvival:
        n_estimators: 100
        max_depth: 3
        learning_rate: 0.1

  validation:
    method: cross_validation
    folds: 5
    stratify_by: event
    repeat: 10

    # Bootstrap validation
    bootstrap:
      enabled: true
      n_iterations: 1000
      confidence_level: 0.95

  metrics:
    survival:
      - c_index
      - integrated_brier_score
      - calibration_slope
      - time_dependent_auc

    # Evaluate at specific time points
    time_points_months: [12, 24, 36, 60]

# =============================================================================
# REPORTING
# =============================================================================
reporting:
  include:
    - data_summary
    - feature_importance
    - model_performance
    - survival_curves # Kaplan-Meier curves
    - calibration_plot
    - risk_stratification # High/low risk groups
    - hazard_ratios # Forest plot

  compliance_checks:
    - TRIPOD
    - RQS

  format: html

  survival_specific:
    median_survival: true
    survival_at_timepoints: [12, 24, 36]
    risk_groups: 2 # or 3 for high/medium/low

# =============================================================================
# EXECUTION
# =============================================================================
execution:
  parallelization:
    enabled: true
    n_jobs: -1

  caching:
    use_cache: true
    cache_features: true

  nextflow:
    enabled: true
    profile: local
    max_memory: "16.GB"
    max_cpus: 8
